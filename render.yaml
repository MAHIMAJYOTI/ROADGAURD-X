# Render.com — Web Service (repo root)
# Dashboard: New → Web Service → connect GitHub repo

buildCommand: pip install -r roadguard_x/requirements.txt && pip install -r api/requirements.txt
startCommand: python -m uvicorn api.server:app --host 0.0.0.0 --port $PORT

envVars:
  - key: PYTHON_VERSION
    value: "3.12.7"
  - key: CORS_ORIGINS
    sync: false
  - key: CORS_ORIGIN_REGEX
    value: https://.*\.vercel\.app
